<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dubai Safari Park - Strategic Creator Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #1A1D23;
            color: #E2E8F0;
            margin: 0;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        
        /* Professional High-Fidelity PDF Export Styles */
        @media print {
            @page { size: auto; margin: 15mm; }
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; padding: 0 !important; margin: 0 !important; }
            main { padding-top: 10px !important; }
            
            /* Ensure every card is captured with high contrast */
            .main-card {
                background: #fcfcfc !important;
                border: 2px solid #000 !important;
                color: black !important;
                padding: 30px !important;
                border-radius: 12px !important;
                page-break-inside: avoid;
            }
            .glass-card { 
                background: #ffffff !important; 
                border: 1px solid #000 !important; 
                color: black !important; 
                backdrop-filter: none !important;
                page-break-inside: avoid;
                margin-bottom: 15px !important;
                box-shadow: none !important;
            }
            h1, h2, h3, h4, h5, p, span { color: black !important; text-shadow: none !important; }
            .text-white, .text-white\/60, .text-white\/40 { color: black !important; opacity: 1 !important; }
            .text-amber-500 { color: #854d0e !important; font-weight: 800 !important; }
            
            /* Layout adjustments for printer paper */
            .grid { display: block !important; }
            .lg\:col-span-8, .lg\:col-span-4 { width: 100% !important; margin-bottom: 40px !important; }
            
            /* Force visibility of tier titles and partner names */
            .font-bold, .font-extrabold { font-weight: bold !important; }
            .bg-gradient-to-br { background: none !important; }
        }

        .glass-card {
            background: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .active-tab-glow {
            box-shadow: 0 4px 20px -2px rgba(245, 158, 11, 0.2);
        }

        /* Modal Animation */
        .modal-enter { animation: modalFadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.92) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body class="antialiased selection:bg-amber-500/30">

    <!-- Navigation Header -->
    <header class="fixed top-0 w-full z-50 bg-[#1A1D23]/95 backdrop-blur-md border-b border-white/5 py-5 flex justify-between items-center px-6 md:px-12 no-print text-left">
        <div class="flex flex-col text-left">
            <h1 class="text-lg md:text-xl font-bold tracking-tight text-white leading-none uppercase">Dubai Safari Park</h1>
            <p class="text-[10px] text-amber-500 font-bold uppercase tracking-[0.4em] mt-1.5 italic">Strategic Creator Calendar · Season 8</p>
        </div>
        
        <button onclick="window.print()" class="flex items-center gap-2 bg-amber-500 hover:bg-amber-400 text-[#1A1D23] px-5 py-2.5 rounded-xl transition-all text-xs font-bold uppercase tracking-widest active:scale-95 shadow-lg shadow-amber-500/10">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
            <span class="hidden sm:inline">Export Page</span>
        </button>
    </header>

    <main class="pt-28 md:pt-36 px-6 md:px-12 max-w-[1400px] mx-auto pb-20 text-left">
        <!-- Dashboard Content Container -->
        <div id="dashboard-root"></div>
    </main>

    <!-- Modal Container -->
    <div id="modal-root" class="fixed inset-0 z-[100] hidden no-print">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" onclick="closeModal()"></div>
        <div id="modal-content" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-xl p-4">
            <!-- Content injected here -->
        </div>
    </div>

    <script>
        const rawData = [
            { id: 'OCT', month: 'OCTOBER 2026', title: 'Opening Campaign / Wild Rules', influencer: 'Diana & Roma <span class="mx-1 opacity-30 text-[10px]">·</span> Ghaith & Sara <span class="mx-1 opacity-30 text-[10px]">·</span> AfroBySara', tiers: [{ level: 'Tier 1', activity: 'Opening Campaign (14 Oct Launch)', influencer: 'Diana & Roma, Ghaith & Sara, AfroBySara' }, { level: 'Tier 2', activity: '1st Midterm SH (13-14)', influencer: '' }, { level: 'Tier 3', activity: 'Diwali (20)', influencer: '' }], color: 'from-purple-700/40 to-indigo-900/50', accent: 'border-purple-400/20', status: 'Launch' },
            { id: 'NOV', month: 'NOVEMBER 2026', title: 'Wild Rules & Eid Al Etihad', influencer: 'Ghaith & Sara <span class="mx-1 opacity-30 text-[10px]">·</span> AfroBySara', tiers: [{ level: 'Tier 1', activity: 'Opening Campaign Continued', influencer: 'Ghaith & Sara, AfroBySara' }, { level: 'Tier 2', activity: 'Eid Al Etihad (29 Nov-2 Dec)', influencer: 'Ghaith & Sara, AfroBySara' }, { level: 'Tier 3', activity: 'Oman National Day (20-21)', influencer: '' }], color: 'from-blue-700/40 to-sky-900/50', accent: 'border-blue-400/20', status: 'Heritage' },
            { id: 'DEC', month: 'DECEMBER 2026', title: 'Festive Village & Winter Break', influencer: 'Diana & Roma <span class="mx-1 opacity-30 text-[10px]">·</span> Ghaith & Sara <span class="mx-1 opacity-30 text-[10px]">·</span> AfroBySara', tiers: [{ level: 'Tier 1', activity: 'Festive Village', influencer: 'Diana & Roma, Ghaith & Sara, AfroBySara' }, { level: 'Tier 2', activity: 'Winter Break SH (8 Dec-4 Jan)', influencer: '' }], color: 'from-rose-700/40 to-red-900/50', accent: 'border-rose-400/20', status: 'Festive' },
            { id: 'FEB', month: 'FEBRUARY 2027', title: 'Conservation & Midterm', influencer: 'Ghaith & Sara', tiers: [{ level: 'Tier 2', activity: '2nd Midterm SH (9-11)', influencer: '' }, { level: 'Tier 3', activity: 'Valentine\'s Day (14)', influencer: 'Ghaith & Sara' }], color: 'from-amber-600/40 to-orange-800/50', accent: 'border-amber-400/20', status: "Valentine's" },
            { id: 'MAR', month: 'MARCH 2027', title: 'Wild Swap & Ramadan', influencer: 'Diana & Roma <span class="mx-1 opacity-30 text-[10px]">·</span> Ghaith & Sara <span class="mx-1 opacity-30 text-[10px]">·</span> AfroBySara', tiers: [{ level: 'Tier 1', activity: 'The Wild Swap: Eid Al Fitr & Springs SH', influencer: 'Diana & Roma, Ghaith & Sara, AfroBySara' }, { level: 'Tier 2', activity: 'Springs SH (16-29)', influencer: '' }], color: 'from-indigo-700/40 to-slate-900/50', accent: 'border-indigo-400/20', status: 'Spring' },
            { id: 'APR', month: 'APRIL 2027', title: 'Kids Go Free & Easter', influencer: 'Diana & Roma <span class="mx-1 opacity-30 text-[10px]">·</span> Ghaith & Sara <span class="mx-1 opacity-30 text-[10px]">·</span> AfroBySara', tiers: [{ level: 'Tier 1', activity: 'Kids Go Free Promotion', influencer: 'Diana & Roma, Ghaith & Sara, AfroBySara' }, { level: 'Tier 2', activity: 'Easter Egg Hunt (4-5)', influencer: 'Diana & Roma Show' }], color: 'from-orange-700/40 to-amber-900/50', accent: 'border-orange-400/20', status: 'Family Impact' },
            { id: 'MAY', month: 'MAY 2027', title: 'Eid Al Adha & Season Wrap', influencer: 'Diana & Roma <span class="mx-1 opacity-30 text-[10px]">·</span> Ghaith & Sara <span class="mx-1 opacity-30 text-[10px]">·</span> AfroBySara', tiers: [{ level: 'Tier 1', activity: 'Eid Al Adha / Closing Season (27-31)', influencer: 'Diana & Roma, Ghaith & Sara, AfroBySara' }, { level: 'Tier 2', activity: '3rd Midterm SH (25-26)', influencer: '' }], color: 'from-zinc-600/40 to-stone-800/50', accent: 'border-zinc-400/20', status: 'Finale' }
        ];

        let activeTab = 'OCT';

        function getTalentLabel(activity) {
            const lower = activity.toLowerCase();
            if (lower.includes('diwali') || lower.includes('oman') || lower.includes('national day') || lower.includes('eid')) return 'Cultural & National Holiday';
            if (lower.includes('sh') || lower.includes('break')) return 'School Holiday';
            return 'Talent';
        }

        function openModal() {
            const current = rawData.find(m => m.id === activeTab);
            const modalRoot = document.getElementById('modal-root');
            const modalContent = document.getElementById('modal-content');
            
            // Logic to determine if snapchat is required (Only for Ghaith & Sara exclusive months)
            const isGhaithSaraOnly = current.influencer.trim() === 'Ghaith & Sara';

            modalContent.innerHTML = `
                <div class="bg-[#1F232B] border border-white/10 rounded-[3rem] overflow-hidden shadow-2xl modal-enter text-left">
                    <div class="p-8 md:p-10 bg-gradient-to-br ${current.color} border-b border-white/5 relative">
                        <div class="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2"></div>
                        <div class="flex justify-between items-start mb-6 relative z-10">
                            <div>
                                <h4 class="text-[10px] font-bold uppercase tracking-[0.3em] text-white/60 mb-1.5">${current.month} Strategy</h4>
                                <h3 class="text-3xl font-bold uppercase tracking-tight text-white leading-tight">Deliverable Specs</h3>
                            </div>
                            <button onclick="closeModal()" class="p-2.5 bg-black/30 hover:bg-black/50 rounded-full text-white transition-all hover:rotate-90">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" x2="6" y1="18" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                            </button>
                        </div>
                    </div>
                    <div class="p-8 md:p-10 space-y-10">
                        <div>
                            <div class="flex items-center gap-3 mb-6">
                                <div class="h-[1px] w-6 bg-amber-500"></div>
                                <span class="text-[11px] font-black uppercase tracking-[0.4em] text-amber-500">Content Format</span>
                            </div>
                            <div class="space-y-5">
                                <div class="flex items-center gap-5 p-6 glass-card rounded-3xl border border-white/5 group transition-all">
                                    <div class="bg-amber-500/10 text-amber-500 rounded-2xl p-3.5 shrink-0 group-hover:bg-amber-500 group-hover:text-black transition-all">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" x2="17" y1="2" x2="22"></line><line x1="2" x2="22" y1="12" y2="12"></line><line x1="2" x2="7" y1="7" y2="7"></line><line x1="2" x2="7" y1="17" y2="17"></line><line x1="17" x2="22" y1="17" y2="17"></line><line x1="17" x2="22" y1="7" y2="7"></line></svg>
                                    </div>
                                    <div class="text-left">
                                        <p class="font-bold text-white uppercase tracking-wide text-base mb-1">x1 Instagram Reel</p>
                                        <p class="text-[11px] text-white/40 leading-relaxed uppercase tracking-wider font-semibold">Per creator · per campaign</p>
                                    </div>
                                </div>
                                <div class="flex items-center gap-5 p-6 glass-card rounded-3xl border border-white/5 group transition-all">
                                    <div class="bg-amber-500/10 text-amber-500 rounded-2xl p-3.5 shrink-0 group-hover:bg-amber-500 group-hover:text-black transition-all">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                                    </div>
                                    <div class="text-left">
                                        <p class="font-bold text-white uppercase tracking-wide text-base mb-1">x1 Instagram Story Set</p>
                                        <p class="text-[11px] text-white/40 leading-relaxed uppercase tracking-wider font-semibold">Per creator · per campaign · Minimum 3 frames</p>
                                    </div>
                                </div>
                                ${isGhaithSaraOnly ? `
                                <div class="flex items-center gap-5 p-6 glass-card rounded-3xl border border-white/5 hover:border-white/10 transition-all group animate-in slide-in-from-top duration-300">
                                    <div class="bg-amber-500/10 text-amber-500 rounded-2xl p-3.5 shrink-0 group-hover:bg-amber-500 group-hover:text-black transition-all">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3c-4.418 0-8 3.582-8 8v7c0 1.657 1.343 3 3 3s3-1.343 3-3V11a2 2 0 1 1 4 0v7c0 1.657 1.343 3 3 3s3-1.343 3-3v-7c0-4.418-3.582-8-8-8z"/></svg>
                                    </div>
                                    <div class="text-left">
                                        <p class="font-bold text-white uppercase tracking-wide text-base mb-1">x1 Snapchat Story Set</p>
                                        <p class="text-[11px] text-white/40 leading-relaxed uppercase tracking-wider font-semibold">@Saraaalwari · per campaign</p>
                                    </div>
                                </div>
                                ` : ''}
                            </div>
                        </div>
                        <div class="pt-2">
                            <button onclick="closeModal()" class="w-full bg-white/5 text-white/80 font-bold py-5 rounded-2xl uppercase text-[11px] tracking-[0.2em] hover:bg-white/10 hover:text-white transition-all border border-white/5">Close Specifications</button>
                        </div>
                    </div>
                </div>
            `;
            modalRoot.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modalRoot = document.getElementById('modal-root');
            modalRoot.classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function render() {
            const current = rawData.find(m => m.id === activeTab);
            const root = document.getElementById('dashboard-root');
            
            root.innerHTML = `
                <!-- Navigation -->
                <div class="flex gap-2 overflow-x-auto pb-6 mb-10 scrollbar-hide no-print text-left">
                    ${rawData.map(m => `
                        <button onclick="setActiveTab('${m.id}')" class="px-6 py-2.5 rounded-2xl text-[11px] font-bold transition-all uppercase tracking-widest ${activeTab === m.id ? 'bg-amber-500 text-[#1A1D23] active-tab-glow scale-105' : 'bg-white/5 text-slate-500 border border-white/10 hover:border-white/20'}">
                            ${m.id}
                        </button>
                    `).join('')}
                </div>

                <!-- Main Layout -->
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 mb-16">
                    <!-- Dashboard Main Card -->
                    <div class="main-card lg:col-span-8 p-10 md:p-12 rounded-[2.5rem] bg-gradient-to-br ${current.color} border-2 ${current.accent} relative overflow-hidden flex flex-col justify-end shadow-2xl min-h-[480px]">
                        <div class="absolute top-0 right-0 w-[400px] h-[400px] bg-white opacity-[0.03] rounded-full blur-[80px] -translate-y-1/2 translate-x-1/2 no-print"></div>
                        
                        <div class="relative z-10 text-left">
                            <div class="flex items-center gap-3 mb-6">
                                <div class="h-1 w-8 bg-white/40 rounded-full"></div>
                                <span class="text-[10px] font-bold uppercase tracking-[0.4em] text-white/60">Strategic Activation Cycle</span>
                            </div>
                            <h2 class="text-4xl md:text-6xl font-extrabold mb-10 tracking-tight leading-none uppercase text-white">${current.month}</h2>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                ${current.tiers.map(t => {
                                    const label = getTalentLabel(t.activity);
                                    const hasInfluencer = t.influencer && t.influencer.trim() !== "";
                                    
                                    return `
                                        <div class="flex flex-col gap-3 p-5 glass-card rounded-[1.5rem] border border-white/5 text-left">
                                            <div class="flex items-center justify-between">
                                                <div class="px-2 py-0.5 rounded bg-white/10 text-white text-[9px] font-bold uppercase tracking-widest border border-white/10 no-print">${t.level}</div>
                                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="text-white/20 no-print"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" x2="16" y1="2" x2="16" y2="6"/><line x1="8" x2="8" y2="8" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                                            </div>
                                            <div class="text-left">
                                                <p class="font-bold text-lg leading-snug uppercase tracking-tight text-white ${hasInfluencer ? 'mb-1.5' : ''}">${t.activity}</p>
                                                <p class="text-[10px] text-white/50 font-semibold uppercase tracking-widest">
                                                    ${label}${hasInfluencer ? `: <span class="text-white/90 font-bold">${t.influencer}</span>` : ''}
                                                </p>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    </div>

                    <!-- Side Branding Card -->
                    <div class="lg:col-span-4 flex flex-col gap-8 text-left">
                        <div class="glass-card flex-1 bg-white/[0.03] border border-white/10 rounded-[3rem] p-10 flex flex-col justify-center shadow-xl">
                            <span class="text-[11px] font-bold uppercase tracking-[0.4em] text-amber-500/80 mb-6 block">Core Ambassador Roster</span>
                            <p class="text-3xl md:text-4xl font-extrabold leading-tight text-white mb-10 tracking-tighter uppercase">${current.influencer}</p>
                            <div class="pt-8 border-t border-white/10 flex items-center gap-4">
                                <div class="h-3 w-3 rounded-full bg-amber-500 active-tab-glow shadow-[0_0_15px_rgba(245,158,11,0.4)] no-print"></div>
                                <span class="text-sm font-bold uppercase tracking-widest text-white/60 uppercase tracking-widest">${current.status} Phase</span>
                            </div>
                        </div>
                        
                        <div onclick="openModal()" class="bg-amber-500 text-[#1A1D23] rounded-[2.5rem] p-10 flex items-center justify-between shadow-2xl hover:bg-white transition-all cursor-pointer group no-print">
                            <div class="text-left">
                                <span class="text-[#1A1D23]/60 text-[11px] font-bold uppercase tracking-widest block mb-1">Strategic Specs</span>
                                <span class="text-2xl font-extrabold uppercase tracking-tighter">Deliverables</span>
                            </div>
                            <div class="bg-[#1A1D23] h-14 w-14 rounded-full flex items-center justify-center text-amber-500 shadow-lg group-hover:scale-110 transition-transform">
                                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" x2="19" y1="12" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Roadmap Overview View -->
                <div class="flex items-center gap-4 mb-8 px-2 text-left no-print">
                    <div class="h-px w-10 bg-white/20"></div>
                    <h4 class="text-[11px] font-bold uppercase tracking-[0.5em] text-slate-500">Season 8 Roadmap Overview</h4>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3 no-print text-left">
                    ${rawData.map(m => `
                        <div onclick="setActiveTab('${m.id}')" class="cursor-pointer p-5 rounded-2xl border-2 transition-all ${activeTab === m.id ? 'bg-amber-500 border-amber-500 text-[#1A1D23] shadow-lg scale-102' : 'bg-white/5 border-white/5 text-slate-400 hover:border-white/10 hover:bg-white/10'}">
                            <div class="flex flex-col h-full justify-between gap-8 text-left">
                                <span class="text-[10px] font-bold tracking-widest uppercase ${activeTab === m.id ? 'text-[#1A1D23]/60' : 'text-slate-600'}">${m.id}</span>
                                <h5 class="text-[11px] font-bold leading-tight uppercase ${activeTab === m.id ? 'text-[#1A1D23]' : 'text-slate-300'}">${m.title.split('/')[0]}</h5>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function setActiveTab(id) {
            activeTab = id;
            render();
        }

        render();
    </script>

    <footer class="py-16 border-t border-white/5 px-12 mt-12 text-left no-print">
        <div class="max-w-[1400px] mx-auto flex flex-col md:flex-row justify-between items-center gap-10">
            <div class="text-left">
                <p class="text-[10px] font-bold uppercase tracking-[0.5em] text-slate-600 leading-none">DUBAI SAFARI PARK</p>
                <p class="text-[9px] font-bold text-slate-700 uppercase tracking-widest mt-2">Strategic Creator Calendar • Season 8</p>
            </div>
            <div class="flex gap-12 text-[10px] font-bold uppercase tracking-[0.3em] text-slate-700">
                <a href="#" class="hover:text-amber-500 transition-colors">Internal Strategy</a>
                <a href="#" class="hover:text-amber-500 transition-colors">Confidential</a>
            </div>
        </div>
    </footer>
</body>
</html>
